<!DOCTYPE html>

<html>
<head>

<title>Parent Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#020617);
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.container{
background:#1e293b;
padding:35px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

input[type="submit"]{
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

input[type="submit"]:hover{
background:#0ea5e9;
}

button{
margin-top:12px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#475569;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#64748b;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>👨‍👩‍👧 Parent Login</h2>

<form method="POST" onsubmit="saveChild()">

<input id="username" name="username" placeholder="Parent Username" required>

<input name="password" type="password" placeholder="Password" required>

<input type="submit" value="Login">

</form>

<br>

<a href="/"><button>Back to Main Login</button></a>

</div>

<script>

function saveChild(){

let user = document.getElementById("username").value;

sessionStorage.setItem("child_name", user);

}

</script>

</body>
</html>
