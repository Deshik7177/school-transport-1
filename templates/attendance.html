<!DOCTYPE html>

<html>

<head>

<title>Attendance Logs</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.table-box{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#020617;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #334155;
}

tr:hover{
background:#020617;
}

.back-btn{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#38bdf8;
color:black;
}

.back-btn:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<div class="container">

<h1>📋 Student Attendance Logs</h1>

<div class="table-box">

<table>

<tr>
<th>ID</th>
<th>Student Name</th>
<th>Status</th>
</tr>

{% for a in attendance %}

<tr>
<td>{{a.id}}</td>
<td>{{a.student_name}}</td>
<td>{{a.status}}</td>
</tr>

{% endfor %}

</table>

</div>

<br>

<a href="/admin_dashboard">
<button class="back-btn">Back to Admin</button>
</a>

</div>

</body>

</html>
